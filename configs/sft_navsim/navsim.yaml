wandb:
  entity: null
#  run_id: askkz9i2
  resume: 'auto'
logger_level: 'info'
logger_format_string: null
gpu: True
experiment:
    scheme_name: 'scheme-5-v2.1_train_from_scheme-1_epoch=10'
    base_root: '/path/to/UniWorldVLA'  # TODO: set to the absolute path of this repo on your machine
    project: "sft_navsim"
    name: "sft_planning"
    output_dir: "${experiment.base_root}/resume_checkpoint/sft_navsim"
    max_train_examples_mmu: 50000
    save_every: 5000
    eval_every: 5000
    generate_every: 200
    log_every: 1
    log_grad_norm_every: 500000
    eval_from_checkpoint: True
    eval_only: False #False
    save_trj_vis: True
    resume_dir: ""
    img_show_path: '${experiment.base_root}/visual_show/sft/navsim'
    text_root: '${experiment.output_dir}/text_pair'
    add_ego: true #
    add_cmd: true
    nfp_loss:
      alpha_coffe: 1.0
      beta_coffe: 0.4 #0.4
      depth_coffe: 0.3
      frame_coffe: 0.7
    eval:
      use_fvd: True
      max_eval_iters: 10000
      use_frame_metrics: true
      eval_generate_times: 4
      max_generate_batchsize: 20
      action_conditioned: True
      max_decode_batchsize: 2
      use_text_metrics: True
      use_trj_metrics: True
      use_depth_evaluation: False    # 启用深度评估
      use_depth_metrics: False       # 启用深度指标计算
      use_depth_visualization: False # 启用深度可视化
      eval_dir: "${experiment.base_root}/pretrained_models/ckpt_sft_navsim"  # TODO: path to released SFT checkpoint
model:
    da3:
        pretrained_model_path: "${experiment.base_root}/pretrained_models/DA3-GIANT-LARGE"  # TODO: see SETUP.md for download instructions
        example_path: "${experiment.base_root}/DA3/examples"
    vq_model:
        type: "Compressive_magvit_v2"
        vq_model_name: "${experiment.base_root}/checkpoints/magvitv2"
        mask_l: 0
        mask_h: 1
        latent_size: 4
        patch_size: 2
        num_vq_embeddings: 8192
        num_dyn_embeddings: 8192
        pretrained_model_path: "${experiment.base_root}/pretrained_models/tokenizer/diffusion_pytorch_model.safetensors"  # TODO: see SETUP.md
    cond_enable: true #false
    showo:
        load_from_showo: True #False
        pretrained_model_path: "${experiment.base_root}/checkpoints/show-o-w-clip-vit"
        w_clip_vit: False #True
        vocab_size: 58498
        llm_vocab_size: 50295
        llm_model_path: '${experiment.base_root}/checkpoints/phi-1_5'
        codebook_size: 8192
        load_lx_train: True
        num_vq_tokens: 256
        num_new_special_tokens: 10  # <|soi|> <|eoi|> <|sov|> <|eov|> <|t2i|> <|mmu|> <|t2v|> <|v2v|> <|lvg|> <|pad|>
        dynamic_size: 8192
        # resume_from_pretrain: "${experiment.base_root}/Policy_World_Model/pre-training/ckpt_w_DFL"
        # resume_from_pretrain: "${experiment.base_root}/Policy_World_Model/ckpt_sft_navsim"
        resume_from_pretrain: "${experiment.base_root}/pretrained_models/pretrain_ckpt"  # TODO: see SETUP.md for pre-trained checkpoint
    eval:
        i3d_path: '${experiment.base_root}/checkpoints/i3d/i3d_torchscript.pt'
    gradient_checkpointing: True

dataset:
    dataset_use: "sft_navsim"
    extract_subset: False
    clip_img_token: -200
    clip_vq_token: -100
    nuplan_10hz_blobs: '${experiment.base_root}/dataset/navsim/nuplan_scene_blobs'
    nuplan_10hz_logs: '${experiment.base_root}/dataset/navsim/navsim/nuplan_img_logs'
    navsim_root: '${experiment.base_root}/dataset/navsim'
    navisim_maps: '${experiment.base_root}/dataset/navsim/maps'  # TODO: navsim map data path
    navsim_log_path: '${experiment.base_root}/dataset/navsim/navsim_logs'
    scene_index_path: "${experiment.base_root}/dataset/navsim/scene_index.pkl"  # generated by data preparation script
    logs_file:
        train_split: 'trainval'
        test_split: 'test'
    scene_filter:
        filter_root: '${experiment.base_root}/navsim/planning/script/config/common/train_test_split/scene_filter'
        train_split: 'navtrain_filtered'
        test_split: 'navtest'
        train_cache: 'navtrain_cache'
        test_cache: 'navtest_cache'
    scoring_path: '${experiment.base_root}/navsim/planning/script/config/pdm_scoring/default_scoring_parameters.yaml'
    proposal_sampling:
        num_poses: 40
        # [s] the time horizon of a trajectory
        time_horizon: null #
        # [s] length of an interval between two states
        interval_length: 0.1

    params:
        add_caption_prompt: True
        shuffle_buffer_size: 1000
        num_workers: 8 #32
        pin_memory: True
        persistent_workers: True
        context_length: 2
        resolution_h: 128
        resolution_w: 224
        # 新增252x448分辨率配置
        resolution_h_252: 252
        resolution_w_448: 448
    preprocessing:
        max_seq_length: 3000
        resolution: [256, 448]
        # 新增252x448预处理分辨率配置
        resolution_252_448: [252, 448]
        center_crop: False
        random_flip: False
    ctd:
      context_length: 2
      condition_length: 2
      segment_horizon: 21
      segment_length: 21
      d_resolution: [128,224]
      c_resolution: [256,448]
      # 新增252x448的CTD分辨率配置
      d_resolution_252_448: [252,448]
      c_resolution_252_448: [252,448]
      fps: 10
      split_frames: 5
      prev_frames: 20
      next_frames: 40
      views:
        CAM_F0: '/nuscenes_front'
        CAM_L0: ''
        CAM_L1: ''
        CAM_L2: ''
        CAM_R0: ''
        CAM_R1: ''
        CAM_R2: ''
        CAM_B0: ''

      navsim_data_path: '/navsim'
    # 深度数据缓存配置 - 优化架构：Depth Encoder强制保存，DataLoader只加载
    depth_cache:
      cache_dir: "${experiment.base_root}/depth_cache_8_futrue_frame_flash"  # 缓存目录
      use_cached_depth: true             # DataLoader是否从缓存加载（只读）
      # 注意：DataLayer不保存数据，Depth Encoder负责强制保存所有计算结果

worker: "${experiment.base_root}/navsim/planning/script/config/common/worker/single_machine_thread_pool.yaml"

optimizer:
    name: adamw
    params: # default adamw params
        learning_rate: 1e-5
        scale_lr: False
        beta1: 0.9
        beta2: 0.999
        weight_decay: 0.01
        epsilon: 1e-8
        vq_learning_rate: 1.0e-5

lr_scheduler:
    scheduler: "cosine"
    params:
        learning_rate: ${optimizer.params.learning_rate}
        warmup_steps: 1000

training:
    gradient_accumulation_steps: 1
    batch_size_train_nus: 7
    batch_size_val_nus: 20
    mixed_precision: "bf16"
    enable_tf32: True
    seed: 10086
    use_residual: 1
    num_workers: 8
    eval_start_epoch: 0
    save_start_epoch: 10
    max_train_steps: 160000
    overfit_one_batch: False
    cond_dropout_prob: 0.1
    min_masking_rate: 0.0
    label_smoothing: 0.0
    max_grad_norm: 2.0 #null
    guidance_scale: 0.0
    lora_enable: False
    video_coeff: 0.3
    tj_coeff: 1.0 #1.0
    motion_weight: True
    
    # 分阶段训练配置
    staged_training:
      enable: true  # 是否启用分阶段训练
      
      # 阶段1: 训练context
      stage1:
        enable: true  # 是否启用该阶段（新增）
        name: "context"
        enable_context: true
        enable_dynamic: false
        freeze_depth_encoder: false  # 训练 depth encoder
        freeze_showo: true  # 冻结 showo 模型
        auto_switch: true  # 是否自动切换到下一阶段
        threshold_metrics:  # 触发切换的条件
          loss_tj_below_threshold: true  # 基于tj loss阈值
          loss_tj_threshold: 0.2  # tj loss阈值
          loss_tj_target_count: 20  # 连续多少次满足阈值
      
      # 阶段2: 训练dynamic（冻结context）
      stage2:
        enable: true  # 是否启用该阶段（新增）
        name: "dynamic"
        enable_context: false
        enable_dynamic: true
        freeze_depth_encoder: false  # 训练 depth encoder
        freeze_showo: true  # 冻结 showo 模型
        auto_switch: true
        threshold_metrics:
           loss_tj_below_threshold: true  # 基于tj loss阈值
           loss_tj_threshold: 0.2 # tj loss阈值
           loss_tj_target_count: 20  # 连续多少次满足阈值
      
      # 阶段3: 同时训练context和dynamic
      stage3:
        enable: true  # 是否启用该阶段（新增）
        name: "both"
        enable_context: true
        enable_dynamic: true
        freeze_depth_encoder: false  # 训练 depth encoder
        freeze_showo: true  # 冻结 showo 模型
        auto_switch: true  # 自动切换到下一阶段
        threshold_metrics:
          step_threshold: 100000  # 基于步数切换
      
      # 阶段4: 冻结depth encoder，训练ShowO模型
      stage4:
        enable: true  # 是否启用该阶段（新增）
        name: "showo_only+mlp+attension"
        enable_context: true  # 保留context和dynamic的计算（作为特征）
        enable_dynamic: False
        freeze_depth_encoder: false  # 冻结depth encoder的所有参数
        freeze_showo: false  # 训练 showo 模型
        auto_switch: false  # 最终阶段，不再自动切换

       # 阶段5: 冻结depth encoder，训练ShowO模型 context_only //todo
      # stage5:
      #   enable: true  # 是否启用该阶段（新增）
      #   name: "context_only"
      #   enable_context: true  # 保留context和dynamic的计算（作为特征）
      #   enable_dynamic: false
      #   freeze_depth_encoder: false  # 冻结depth encoder的所有参数
      #   freeze_showo: false  # 训练 showo 模型
      #   auto_switch: false  # 最终阶段，不再自动切换